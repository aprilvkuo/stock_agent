## 🎯 系统配置

### 基础设置
```yaml
system:
  name: "股票多 Agent 系统"
  version: "v1.6"
  timezone: "Asia/Shanghai"
  data_dir: "/Users/egg/.openclaw/workspace/agents/stock-coordinator/data"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
```

