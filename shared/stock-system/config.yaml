## 📝 日志配置

### 日志设置
```yaml
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # 日志文件
  file:
    enabled: true
    path: "/Users/egg/.openclaw/workspace/agents/stock-coordinator/data/logs/system.log"
    max_size: 10485760  # 10MB
    backup_count: 5     # 保留 5 个备份
  
  # 控制台输出
  console:
    enabled: true
    color: true
```

