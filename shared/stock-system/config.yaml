## 📈 评级配置

### 综合评级权重
```yaml
rating:
  # 权重配置（6 个 Agent，3 个参与决策）
  weights:
    fundamental: 0.35  # 基本面 Agent
    technical: 0.30    # 技术面 Agent
    sentiment: 0.35    # 情绪 Agent（权重提升至 0.35）
  
  # 评级阈值
  thresholds:
    strong_buy: 85   # 强烈买入
    buy: 70          # 买入
    hold: 50         # 持有
    sell: 30         # 卖出
    strong_sell: 0   # 强烈卖出
  
  # 置信度阈值
  confidence:
    high: 80    # 高置信度
    medium: 60  # 中置信度
    low: 40     # 低置信度
```

