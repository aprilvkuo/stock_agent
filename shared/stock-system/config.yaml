## 🔒 安全配置

### API 密钥（示例）
```yaml
security:
  # 不要在此文件中存储真实密钥！
  # 使用环境变量或单独的 secrets.yaml
  
  api_keys:
    tencent: "${TENCENT_API_KEY}"
    eastmoney: "${EASTMONEY_API_KEY}"
  
  # 访问控制
  access_control:
    enabled: false
    allowed_ips: []
```

