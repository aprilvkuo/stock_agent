## 📊 缓存配置

### 数据缓存
```yaml
cache:
  enabled: true
  directory: "/Users/egg/.openclaw/workspace/shared/stock-system/data/cache"
  
  # 不同类型数据的 TTL
  ttl:
    realtime: 60       # 实时数据：60 秒
    daily: 3600        # 日线数据：1 小时
    financial: 86400   # 财务数据：24 小时
    default: 300       # 默认：5 分钟
  
  # 清理策略
  cleanup:
    max_age: 604800    # 最大保存 7 天
    max_size: 104857600  # 最大 100MB
```

