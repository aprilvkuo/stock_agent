## 🤖 Agent 配置

### 基本面 Agent
```yaml
agents:
  fundamental:
    enabled: true
    weight: 0.35  # 权重（动态调整）
    
    # 分析维度
    dimensions:
      - revenue_growth      # 营收增速
      - profit_growth       # 利润增速
      - roe                 # 净资产收益率
      - pe_ratio           # 市盈率
      - pb_ratio           # 市净率
      - cash_flow          # 现金流（待实现）
      - debt_ratio         # 负债率（待实现）
    
    # 评级阈值
    thresholds:
      revenue_growth:
        excellent: 30   # >30% 优秀
        good: 15        # >15% 良好
        normal: 5       # >5% 正常
      profit_growth:
        excellent: 40
        good: 20
        normal: 10
      roe:
        excellent: 20
        good: 15
        normal: 10
```

### 技术面 Agent
```yaml
  technical:
    enabled: true
    weight: 0.30
    
    # 分析维度
    dimensions:
      - ma_trend        # 均线趋势
      - macd            # MACD
      - rsi             # RSI
      - bollinger       # 布林带（待实现）
      - kdj             # KDJ（待实现）
    
    # 参数配置
    parameters:
      ma_periods: [5, 10, 20, 60]  # 均线周期
      rsi_period: 14
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
```

### 情绪 Agent
```yaml
  sentiment:
    enabled: true
    weight: 0.20
    
    # 分析维度
    dimensions:
      - price_sentiment    # 价格情绪
      - volume_sentiment   # 成交量情绪
      - ma_sentiment       # 均线情绪
      - rsi_sentiment      # RSI 情绪
    
    # 权重配置
    weights:
      price: 0.35
      volume: 0.25
      ma: 0.25
      rsi: 0.15
```

### 质检 Agent
```yaml
  qa:
    enabled: true
    weight: 0.15  # 预留权重（实际不参与决策）
    
    # 监控维度
    dimensions:
      - system_health     # 系统健康检查
      - agent_performance # Agent 表现统计
      - visual_check      # 视觉检查（网页 UI）
      - knowledge_check   # 知识库检查
    
    # 报告配置
    reports:
      health_report: "monitor/health_report.json"
      ui_report: "monitor/ui_report.json"
      screenshot_dir: "monitor/screenshots"
```

