## ⏰ 定时任务配置

### Heartbeat 配置
```yaml
scheduler:
  timezone: "Asia/Shanghai"
  
  # 每日验证
  daily_validation:
    enabled: true
    time: "09:00"  # 每个交易日 09:00
    script: "scripts/auto_agent.py daily"
  
  # 周度复盘
  weekly_review:
    enabled: true
    day: "friday"  # 周五
    time: "20:00"
    script: "scripts/auto_agent.py weekly"
  
  # 缓存清理
  cache_cleanup:
    enabled: true
    time: "03:00"  # 凌晨 3 点
    action: "cleanup_expired"
```

