## 📊 数据源配置

### 腾讯财经 API（实时股价）
```yaml
data_sources:
  tencent:
    enabled: true
    base_url: "http://qt.gtimg.cn/q="
    timeout: 5  # 秒
    retry_times: 3
    cache_ttl: 60  # 缓存时间（秒）
    
    # 支持的市前缀
    market_prefix:
      A_sh: "sh"  # 上交所
      A_sz: "sz"  # 深交所
      HK: "hk"    # 港股
      US: ""      # 美股（暂不支持）
```

### 东方财富 API（资金流向）
```yaml
  eastmoney:
    enabled: true
    north_flow_url: "http://push2.eastmoney.com/api/qt/kamt.rtmin/Get"
    timeout: 10
    retry_times: 3
    cache_ttl: 300  # 5 分钟
```

### 新浪财经 API（备选）
```yaml
  sina:
    enabled: false  # 备用数据源
    base_url: "http://hq.sinajs.cn/list="
    timeout: 5
    retry_times: 2
```

