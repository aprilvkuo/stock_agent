<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 复盘报告 - 股票多 Agent 系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'china-red': '#E74C3C',
                        'china-green': '#27AE60',
                        'dark-bg': '#1A1A2E',
                        'dark-card': '#16213E',
                        'dark-border': '#0F3460'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card {
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(15, 52, 96, 0.5);
        }
        .markdown-body {
            color: #e0e0e0;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #fff;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .markdown-body h2 {
            border-bottom: 2px solid rgba(231, 76, 60, 0.5);
            padding-bottom: 0.5rem;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid rgba(15, 52, 96, 0.5);
            padding: 0.75rem;
            text-align: left;
        }
        .markdown-body th {
            background: rgba(15, 52, 96, 0.3);
        }
        .report-item:hover {
            background: rgba(231, 76, 60, 0.1);
            cursor: pointer;
        }
        .report-active {
            background: rgba(231, 76, 60, 0.2);
            border-left: 3px solid #E74C3C;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 返回按钮和标题 -->
        <div class="mb-6">
            <a href="/" class="inline-flex items-center text-gray-400 hover:text-white mb-4 transition-colors">
                ← 返回首页
            </a>
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">📝 复盘报告</h1>
                    <p class="text-gray-400 mt-1">查看复盘 Agent 的总结和改进建议</p>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-bold text-china-green" id="total-reports">0</div>
                    <div class="text-sm text-gray-400">份报告</div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="card rounded-xl p-4">
                <h3 class="text-gray-400 text-sm mb-2">📊 平均成功率</h3>
                <p id="avg-success-rate" class="text-2xl font-bold">-</p>
            </div>
            <div class="card rounded-xl p-4">
                <h3 class="text-gray-400 text-sm mb-2">✅ 平均成功次数</h3>
                <p id="avg-success-count" class="text-2xl font-bold">-</p>
            </div>
            <div class="card rounded-xl p-4">
                <h3 class="text-gray-400 text-sm mb-2">📈 平均报告数</h3>
                <p id="avg-total-reports" class="text-2xl font-bold">-</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：报告列表 -->
            <div class="lg:col-span-1">
                <div class="card rounded-xl p-4 sticky top-4">
                    <h2 class="text-xl font-bold mb-4">📄 报告列表</h2>
                    <div class="space-y-2 max-h-[600px] overflow-y-auto" id="report-list">
                        <div class="text-center py-8 text-gray-400">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- 右侧：报告详情 -->
            <div class="lg:col-span-2">
                <div class="card rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold" id="report-title">选择一份报告查看</h2>
                        <button onclick="loadReportList()" class="text-sm text-blue-400 hover:text-blue-300">
                            🔄 刷新
                        </button>
                    </div>
                    <div id="report-content" class="markdown-body">
                        <div class="text-center py-12 text-gray-400">
                            <p class="text-lg">👈 请从左侧选择一份复盘报告</p>
                            <p class="text-sm mt-2">查看复盘 Agent 的总结和改进建议</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allReports = [];

        async function loadReportList() {
            try {
                const response = await fetch('/api/evolution');
                const data = await response.json();
                
                allReports = data.reports;
                document.getElementById('total-reports').textContent = data.count;
                
                // 计算平均值
                if (data.reports.length > 0) {
                    const avgRate = (data.reports.reduce((sum, r) => sum + r.success_rate, 0) / data.reports.length).toFixed(1);
                    const avgCount = Math.round(data.reports.reduce((sum, r) => sum + r.success_count, 0) / data.reports.length);
                    const avgTotal = Math.round(data.reports.reduce((sum, r) => sum + r.total_reports, 0) / data.reports.length);
                    
                    document.getElementById('avg-success-rate').textContent = avgRate + '%';
                    document.getElementById('avg-success-count').textContent = avgCount;
                    document.getElementById('avg-total-reports').textContent = avgTotal;
                }
                
                // 渲染报告列表
                const listHtml = data.reports.map((report, index) => `
                    <div class="report-item p-3 rounded-lg border border-dark-border transition-all" 
                         onclick="loadReportDetail('${report.filename}', ${index})">
                        <div class="flex items-center justify-between mb-2">
                            <div class="font-bold text-sm">${report.filename.replace('evolution-', '').replace('.md', '')}</div>
                            <div class="text-xs text-gray-400">${report.time.split(' ')[0]}</div>
                        </div>
                        <div class="flex items-center gap-3 text-xs">
                            <span class="text-green-400">✅ 成功：${report.success_count}</span>
                            <span class="text-blue-400">📊 成功率：${report.success_rate}%</span>
                            <span class="text-purple-400">📈 报告：${report.total_reports}</span>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('report-list').innerHTML = listHtml || '<div class="text-center py-8 text-gray-400">暂无复盘报告</div>';
                
            } catch (error) {
                console.error('加载报告列表失败:', error);
                document.getElementById('report-list').innerHTML = `
                    <div class="text-center py-8 text-red-400">
                        ❌ 加载失败：${error.message}
                    </div>
                `;
            }
        }

        async function loadReportDetail(filename, index) {
            try {
                // 高亮选中的报告
                document.querySelectorAll('.report-item').forEach((item, i) => {
                    if (i === index) {
                        item.classList.add('report-active');
                    } else {
                        item.classList.remove('report-active');
                    }
                });
                
                // 更新标题
                const report = allReports[index];
                document.getElementById('report-title').textContent = `📄 ${filename}`;
                
                // 加载详情
                const response = await fetch(`/api/evolution/${filename}`);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('report-content').innerHTML = `
                        <div class="text-center py-8 text-red-400">
                            ❌ 加载失败：${data.error}
                        </div>
                    `;
                    return;
                }
                
                // 渲染 Markdown
                document.getElementById('report-content').innerHTML = marked.parse(data.content);
                
            } catch (error) {
                console.error('加载报告详情失败:', error);
                document.getElementById('report-content').innerHTML = `
                    <div class="text-center py-8 text-red-400">
                        ❌ 加载失败：${error.message}
                    </div>
                `;
            }
        }

        // 页面加载时获取报告列表
        loadReportList();
    </script>
</body>
</html>
