<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓管理 - 股票多 Agent 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .card .sub {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .holdings-list {
            list-style: none;
        }
        
        .holding-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        
        .holding-item:hover {
            transform: translateX(5px);
        }
        
        .holding-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .holding-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .holding-code {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .holding-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .detail-item {
            font-size: 14px;
            color: #666;
        }
        
        .detail-item strong {
            color: #333;
        }
        
        .holding-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .holding-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        
        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .btn-edit:hover {
            background: #bbdefb;
        }
        
        .btn-delete {
            background: #ffebee;
            color: #c62828;
        }
        
        .btn-delete:hover {
            background: #ffcdd2;
        }
        
        .market-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .market-A { background: #ffebee; color: #c62828; }
        .market-HK { background: #e8f5e9; color: #2e7d32; }
        .market-US { background: #e3f2fd; color: #1976d2; }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background: #f8f9fa;
        }
        
        .upload-area.dragover {
            background: #e3f2fd;
        }
        
        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }
        
        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #667eea;
            font-size: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 持仓管理</h1>
            <p>管理您的 A 股、港股、美股持仓</p>
        </div>
        
        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="card">
                <h3>总持仓数</h3>
                <div class="value" id="total-count">-</div>
                <div class="sub">只股票</div>
            </div>
            <div class="card">
                <h3>A 股</h3>
                <div class="value" id="a-count">-</div>
                <div class="sub">只</div>
            </div>
            <div class="card">
                <h3>港股</h3>
                <div class="value" id="hk-count">-</div>
                <div class="sub">只</div>
            </div>
            <div class="card">
                <h3>美股</h3>
                <div class="value" id="us-count">-</div>
                <div class="sub">只</div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Add Holding Form -->
            <div class="panel">
                <h2>➕ 添加持仓</h2>
                
                <div id="add-alert" class="alert"></div>
                
                <!-- Image Upload -->
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">📷</div>
                    <p><strong>点击或拖拽上传持仓截图</strong></p>
                    <p style="color: #999; font-size: 12px; margin-top: 5px;">支持 OCR 自动识别（功能开发中）</p>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                </div>
                
                <form id="add-form">
                    <div class="form-group">
                        <label>股票代码 *</label>
                        <input type="text" id="stock-code" placeholder="如：600519 / 00700 / AAPL" required>
                    </div>
                    
                    <div class="form-group">
                        <label>股票名称 *</label>
                        <input type="text" id="stock-name" placeholder="如：贵州茅台 / 腾讯控股 / 苹果" required>
                    </div>
                    
                    <div class="form-group">
                        <label>市场类型 *</label>
                        <select id="market-type" required>
                            <option value="A">A 股</option>
                            <option value="HK">港股</option>
                            <option value="US">美股</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>股数 *</label>
                        <input type="number" id="shares" placeholder="如：100" step="1" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label>成本价 *</label>
                        <input type="number" id="cost-price" placeholder="如：1500.00" step="0.01" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="notes" placeholder="可选，如：长期持有、定投等"></textarea>
                    </div>
                    
                    <button type="submit" class="btn">添加持仓</button>
                </form>
            </div>
            
            <!-- Holdings List -->
            <div class="panel">
                <h2>📋 持仓列表</h2>
                <ul class="holdings-list" id="holdings-list">
                    <!-- 动态加载 -->
                </ul>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ 编辑持仓</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="edit-code" readonly>
                </div>
                <div class="form-group">
                    <label>股票名称</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label>股数</label>
                    <input type="number" id="edit-shares" required>
                </div>
                <div class="form-group">
                    <label>成本价</label>
                    <input type="number" id="edit-cost" required>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="edit-notes"></textarea>
                </div>
                <button type="submit" class="btn">保存修改</button>
            </form>
        </div>
    </div>
    
    <script>
        // API 基础路径
        const API_BASE = '/api/holdings';
        
        // 页面加载时获取持仓列表
        document.addEventListener('DOMContentLoaded', loadHoldings);
        
        // 加载持仓列表
        async function loadHoldings() {
            try {
                const response = await fetch(`${API_BASE}?status=active`);
                const data = await response.json();
                
                renderHoldings(data.holdings);
                updateSummary(data.summary);
            } catch (error) {
                console.error('加载持仓失败:', error);
            }
        }
        
        // 渲染持仓列表
        function renderHoldings(holdings) {
            const list = document.getElementById('holdings-list');
            
            if (holdings.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无持仓</p>
                        <p style="font-size: 12px;">添加您的第一只持仓股吧！</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = holdings.map(holding => `
                <li class="holding-item">
                    <div class="holding-header">
                        <span class="holding-name">${holding.stock_name}</span>
                        <div>
                            <span class="market-badge market-${holding.market_type}">${getMarketName(holding.market_type)}</span>
                            <span class="holding-code">${holding.stock_code}</span>
                        </div>
                    </div>
                    <div class="holding-details">
                        <div class="detail-item">
                            <strong>股数：</strong>${formatNumber(holding.shares)}
                        </div>
                        <div class="detail-item">
                            <strong>成本：</strong>¥${formatNumber(holding.cost_price)}
                        </div>
                        <div class="detail-item">
                            <strong>总市值：</strong>¥${formatNumber(holding.shares * holding.cost_price)}
                        </div>
                    </div>
                    ${holding.notes ? `<div style="color: #666; font-size: 13px; margin-top: 10px;">📝 ${holding.notes}</div>` : ''}
                    <div class="holding-actions">
                        <button class="btn-edit" onclick="editHolding('${holding.id}')">✏️ 编辑</button>
                        <button class="btn-delete" onclick="deleteHolding('${holding.id}')">🗑️ 删除</button>
                    </div>
                </li>
            `).join('');
        }
        
        // 更新汇总卡片
        function updateSummary(summary) {
            document.getElementById('total-count').textContent = summary.total_count;
            document.getElementById('a-count').textContent = summary.by_market.A;
            document.getElementById('hk-count').textContent = summary.by_market.HK;
            document.getElementById('us-count').textContent = summary.by_market.US;
        }
        
        // 添加持仓表单提交
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const holding = {
                stock_code: document.getElementById('stock-code').value,
                stock_name: document.getElementById('stock-name').value,
                shares: parseFloat(document.getElementById('shares').value),
                cost_price: parseFloat(document.getElementById('cost-price').value),
                market_type: document.getElementById('market-type').value,
                notes: document.getElementById('notes').value,
            };
            
            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(holding),
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('add-alert', '添加成功！', 'success');
                    document.getElementById('add-form').reset();
                    loadHoldings();
                } else {
                    showAlert('add-alert', result.error || '添加失败', 'error');
                }
            } catch (error) {
                showAlert('add-alert', '网络错误：' + error.message, 'error');
            }
        });
        
        // 编辑持仓
        function editHolding(id) {
            fetch(`${API_BASE}/${id}`)
                .then(res => res.json())
                .then(holding => {
                    document.getElementById('edit-id').value = holding.id;
                    document.getElementById('edit-code').value = holding.stock_code;
                    document.getElementById('edit-name').value = holding.stock_name;
                    document.getElementById('edit-shares').value = holding.shares;
                    document.getElementById('edit-cost').value = holding.cost_price;
                    document.getElementById('edit-notes').value = holding.notes || '';
                    
                    document.getElementById('edit-modal').classList.add('active');
                });
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }
        
        // 保存编辑
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('edit-id').value;
            const updates = {
                stock_name: document.getElementById('edit-name').value,
                shares: parseFloat(document.getElementById('edit-shares').value),
                cost_price: parseFloat(document.getElementById('edit-cost').value),
                notes: document.getElementById('edit-notes').value,
            };
            
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates),
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeModal();
                    loadHoldings();
                } else {
                    alert('更新失败：' + result.error);
                }
            } catch (error) {
                alert('网络错误：' + error.message);
            }
        });
        
        // 删除持仓
        async function deleteHolding(id) {
            if (!confirm('确定要删除这只持仓吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE',
                });
                
                const result = await response.json();
                
                if (result.success) {
                    loadHoldings();
                } else {
                    alert('删除失败：' + result.error);
                }
            } catch (error) {
                alert('网络错误：' + error.message);
            }
        }
        
        // 工具函数
        function getMarketName(type) {
            const names = { 'A': 'A 股', 'HK': '港股', 'US': '美股' };
            return names[type] || type;
        }
        
        function formatNumber(num) {
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        
        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
        
        // 图片上传（预留 OCR 功能）
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                alert('图片上传功能开发中，当前请先手动输入持仓信息。');
            }
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                alert('图片上传功能开发中，当前请先手动输入持仓信息。');
            }
        });
    </script>
</body>
</html>
