<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 股票分析报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'china-red': '#E74C3C',
                        'china-green': '#27AE60',
                        'dark-bg': '#1A1A2E',
                        'dark-card': '#16213E',
                        'dark-border': '#0F3460'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card {
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(15, 52, 96, 0.5);
        }
        .markdown-body {
            color: #e0e0e0;
            line-height: 1.6;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .markdown-body th,
        .markdown-body td {
            border: 1px solid rgba(15, 52, 96, 0.5);
            padding: 0.75rem;
            text-align: left;
        }
        .markdown-body th {
            background: rgba(15, 52, 96, 0.3);
            font-weight: 600;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            color: #fff;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .markdown-body h2 {
            border-bottom: 2px solid rgba(231, 76, 60, 0.5);
            padding-bottom: 0.5rem;
        }
        .tab-active {
            background: rgba(231, 76, 60, 0.2);
            border-color: #E74C3C;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 返回按钮和标题 -->
        <div class="mb-6">
            <a href="/" class="inline-flex items-center text-gray-400 hover:text-white mb-4 transition-colors">
                ← 返回首页
            </a>
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="stockTitle" class="text-3xl font-bold">加载中...</h1>
                    <p id="stockSubtitle" class="text-gray-400 mt-1"></p>
                </div>
                <div id="ratingBadge" class="px-4 py-2 rounded-lg font-bold text-lg"></div>
            </div>
        </div>

        <!-- 选项卡 -->
        <div class="mb-6">
            <div class="flex space-x-2 border-b border-gray-700">
                <button onclick="switchTab('fundamental')" id="tab-fundamental" class="tab-btn tab-active px-6 py-3 font-semibold transition-all">
                    📊 基本面
                </button>
                <button onclick="switchTab('technical')" id="tab-technical" class="tab-btn px-6 py-3 font-semibold transition-all">
                    📈 技术面
                </button>
                <button onclick="switchTab('sentiment')" id="tab-sentiment" class="tab-btn px-6 py-3 font-semibold transition-all">
                    😊 情绪面
                </button>
            </div>
        </div>

        <!-- 报告内容 -->
        <div class="card rounded-xl p-6 mb-6">
            <div id="reportContent" class="markdown-body">
                <div class="text-center py-12">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-500 mx-auto"></div>
                    <p class="mt-4 text-gray-400">加载报告中...</p>
                </div>
            </div>
        </div>

        <!-- 数据摘要卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="card rounded-xl p-4">
                <h3 class="text-gray-400 text-sm mb-2">📊 基本面评级</h3>
                <p id="fundamentalRating" class="text-2xl font-bold">-</p>
                <p id="fundamentalConfidence" class="text-sm text-gray-400 mt-1">置信度：-</p>
            </div>
            <div class="card rounded-xl p-4">
                <h3 class="text-gray-400 text-sm mb-2">📈 技术面评级</h3>
                <p id="technicalRating" class="text-2xl font-bold">-</p>
                <p id="technicalConfidence" class="text-sm text-gray-400 mt-1">置信度：-</p>
            </div>
            <div class="card rounded-xl p-4">
                <h3 class="text-gray-400 text-sm mb-2">😊 情绪面评级</h3>
                <p id="sentimentRating" class="text-2xl font-bold">-</p>
                <p id="sentimentConfidence" class="text-sm text-gray-400 mt-1">置信度：-</p>
            </div>
        </div>

        <!-- 完整原始报告 -->
        <div class="card rounded-xl p-6">
            <h3 class="text-xl font-bold mb-4">📄 完整分析报告</h3>
            <div id="rawContent" class="markdown-body text-sm text-gray-300 whitespace-pre-wrap font-mono bg-gray-900 p-4 rounded-lg max-h-96 overflow-y-auto">
                加载中...
            </div>
        </div>
    </div>

    <script>
        const stockCode = '{{ stock_code }}';
        let currentTab = 'fundamental';
        let reportData = null;

        function switchTab(tab) {
            currentTab = tab;
            
            // 更新选项卡样式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
            });
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            
            // 更新内容
            renderReport();
        }

        function renderReport() {
            if (!reportData) return;
            
            const content = reportData.contents[currentTab];
            const rawContent = document.getElementById('rawContent');
            const reportContent = document.getElementById('reportContent');
            
            if (content) {
                // 渲染 Markdown
                reportContent.innerHTML = marked.parse(content);
                rawContent.textContent = content;
            } else {
                reportContent.innerHTML = '<p class="text-gray-400 text-center py-8">暂无数据</p>';
                rawContent.textContent = '暂无数据';
            }
        }

        function updateSummary() {
            if (!reportData) return;
            
            const reports = reportData.reports;
            
            // 基本面
            if (reports.fundamental) {
                document.getElementById('fundamentalRating').textContent = reports.fundamental.rating || '-';
                document.getElementById('fundamentalConfidence').textContent = `置信度：${reports.fundamental.confidence || 0}%`;
            }
            
            // 技术面
            if (reports.technical) {
                document.getElementById('technicalRating').textContent = reports.technical.rating || '-';
                document.getElementById('technicalConfidence').textContent = `置信度：${reports.technical.confidence || 0}%`;
            }
            
            // 情绪面
            if (reports.sentiment) {
                document.getElementById('sentimentRating').textContent = reports.sentiment.rating || '-';
                document.getElementById('sentimentConfidence').textContent = `置信度：${reports.sentiment.confidence || 0}%`;
            }
        }

        function updateHeader() {
            if (!reportData || !reportData.stock) return;
            
            const stock = reportData.stock;
            document.getElementById('stockTitle').textContent = `${stock.name || '未知'} (${stock.code})`;
            document.getElementById('stockSubtitle').textContent = `请求时间：${stock.request_time || 'N/A'} | 状态：${stock.status || 'N/A'}`;
            
            // 根据状态设置徽章
            const badge = document.getElementById('ratingBadge');
            if (stock.status.includes('推荐')) {
                badge.textContent = '🟢 推荐';
                badge.className = 'px-4 py-2 rounded-lg font-bold text-lg bg-green-600';
            } else if (stock.status.includes('回避')) {
                badge.textContent = '🔴 回避';
                badge.className = 'px-4 py-2 rounded-lg font-bold text-lg bg-red-600';
            } else {
                badge.textContent = '🟡 观望';
                badge.className = 'px-4 py-2 rounded-lg font-bold text-lg bg-yellow-600';
            }
        }

        async function loadReport() {
            try {
                const response = await fetch(`/api/report/${stockCode}`);
                reportData = await response.json();
                
                updateHeader();
                updateSummary();
                renderReport();
            } catch (error) {
                console.error('加载报告失败:', error);
                document.getElementById('reportContent').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-red-400">❌ 加载报告失败</p>
                        <p class="text-gray-400 mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // 页面加载时获取数据
        loadReport();
    </script>
</body>
</html>
