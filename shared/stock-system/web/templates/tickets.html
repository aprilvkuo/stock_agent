<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎫 工单系统 - Agent 互相指导</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 50%, #16213E 100%);
            min-height: 100vh;
            color: white;
        }
        .card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        .nav-item {
            transition: all 0.3s;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .nav-item.active {
            background: rgba(99, 102, 241, 0.2);
            border-left: 3px solid #6366F1;
        }
        .ticket-card {
            transition: all 0.3s;
        }
        .ticket-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="bg-gray-900/90 backdrop-blur border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-8">
                    <a href="/" class="text-xl font-bold text-white">📊 Agent 监控系统</a>
                    <div class="flex gap-2">
                        <a href="/" class="nav-item px-4 py-2 rounded text-gray-300 hover:text-white">🏠 首页</a>
                        <a href="/tickets" class="nav-item active px-4 py-2 rounded text-white">🎫 工单系统</a>
                        <a href="/agent-transparency" class="nav-item px-4 py-2 rounded text-gray-300 hover:text-white">📈 透明度</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <!-- 页面标题 -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold mb-2">🎫 工单系统</h1>
            <p class="text-gray-400">实时跟踪所有任务工单，支持筛选和搜索</p>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="card p-4 text-center">
                <div id="stat-total" class="text-3xl font-bold text-white">-</div>
                <div class="text-sm text-gray-400">总工单</div>
            </div>
            <div class="card p-4 text-center">
                <div id="stat-open" class="text-3xl font-bold text-yellow-400">-</div>
                <div class="text-sm text-gray-400">待处理</div>
            </div>
            <div class="card p-4 text-center">
                <div id="stat-progress" class="text-3xl font-bold text-blue-400">-</div>
                <div class="text-sm text-gray-400">进行中</div>
            </div>
            <div class="card p-4 text-center">
                <div id="stat-done" class="text-3xl font-bold text-green-400">-</div>
                <div class="text-sm text-gray-400">已完成</div>
            </div>
            <div class="card p-4 text-center">
                <div id="stat-rate" class="text-3xl font-bold text-purple-400">-%</div>
                <div class="text-sm text-gray-400">完成率</div>
            </div>
        </div>

        <!-- 筛选和搜索 -->
        <div class="card p-4 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">按 Agent 筛选</label>
                    <select id="filter-agent" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
                        <option value="">全部 Agent</option>
                        <option value="programmer">程序员 Agent</option>
                        <option value="qa">质检 Agent</option>
                        <option value="coordinator">主 Agent</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">按优先级筛选</label>
                    <select id="filter-priority" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
                        <option value="">全部优先级</option>
                        <option value="critical">🔴 Critical</option>
                        <option value="high">🟠 High</option>
                        <option value="medium">🟡 Medium</option>
                        <option value="low">🟢 Low</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">按状态筛选</label>
                    <select id="filter-status" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
                        <option value="">全部状态</option>
                        <option value="open">🟡 待处理</option>
                        <option value="in_progress">🔵 进行中</option>
                        <option value="done">✅ 已完成</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">搜索</label>
                    <input type="text" id="search" placeholder="搜索任务..." class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
                </div>
            </div>
        </div>

        <!-- 工单列表 -->
        <div id="ticket-list" class="space-y-4">
            <div class="text-center text-gray-500 py-8">加载中...</div>
        </div>
    </div>

    <script>
        const agentNames = {
            'programmer': '程序员 Agent',
            'qa': '质检 Agent',
            'coordinator': '主 Agent',
            'fundamental': '基本面 Agent',
            'technical': '技术面 Agent',
            'sentiment': '情绪 Agent'
        };

        const priorityColors = {
            'critical': 'border-red-500 bg-red-900/20',
            'high': 'border-orange-500 bg-orange-900/20',
            'medium': 'border-yellow-500 bg-yellow-900/20',
            'low': 'border-blue-500 bg-blue-900/20'
        };

        const statusEmoji = {
            'open': '🟡',
            'in_progress': '🔵',
            'done': '✅',
            'closed': '⚪'
        };

        async function loadTickets() {
            try {
                const [ticketsRes, statsRes] = await Promise.all([
                    fetch('/api/improvement-tickets'),
                    fetch('/api/improvement-tickets/stats')
                ]);

                const tickets = await ticketsRes.json();
                const stats = await statsRes.json();

                // 更新统计
                document.getElementById('stat-total').textContent = stats.total || 0;
                document.getElementById('stat-open').textContent = stats.by_status?.open || 0;
                document.getElementById('stat-progress').textContent = stats.by_status?.in_progress || 0;
                document.getElementById('stat-done').textContent = (stats.by_status?.done || 0) + (stats.by_status?.closed || 0);
                document.getElementById('stat-rate').textContent = (stats.completion_rate || 0) + '%';

                // 筛选和搜索
                const agentFilter = document.getElementById('filter-agent').value;
                const priorityFilter = document.getElementById('filter-priority').value;
                const statusFilter = document.getElementById('filter-status').value;
                const searchText = document.getElementById('search').value.toLowerCase();

                let filtered = tickets.filter(t => {
                    if (agentFilter && t.provider !== agentFilter) return false;
                    if (priorityFilter && t.priority !== priorityFilter) return false;
                    if (statusFilter && t.status !== statusFilter) return false;
                    if (searchText && !t.task_title?.toLowerCase().includes(searchText)) return false;
                    return true;
                });

                // 按优先级排序
                const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
                filtered.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

                // 渲染工单
                const container = document.getElementById('ticket-list');
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500 py-8">暂无工单</div>';
                    return;
                }

                container.innerHTML = filtered.map(ticket => {
                    const actions = ticket.improvement_plan?.actions || [];
                    const pendingActions = actions.filter(a => a.status === 'pending').length;
                    const doneActions = actions.filter(a => a.status === 'done').length;
                    const progress = actions.length > 0 ? Math.round(doneActions / actions.length * 100) : 0;

                    return `
                        <div class="ticket-card card p-6 border-l-4 ${priorityColors[ticket.priority] || 'border-gray-500'}">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-2">
                                        <span class="text-2xl">${statusEmoji[ticket.status] || '⚪'}</span>
                                        <span class="text-lg font-bold">${ticket.task_title || '无标题'}</span>
                                        <span class="text-xs px-2 py-1 rounded bg-gray-700">${ticket.priority}</span>
                                        <span class="text-xs px-2 py-1 rounded ${ticket.type === 'urgent_task' ? 'bg-red-700' : 'bg-blue-700'}">${ticket.type === 'urgent_task' ? '🔴 紧急' : '任务'}</span>
                                    </div>
                                    <div class="text-sm text-gray-400 mb-2">
                                        <span class="text-blue-400">${agentNames[ticket.consumer] || ticket.consumer}</span>
                                        <span class="text-gray-500 mx-2">→</span>
                                        <span class="text-purple-400">${agentNames[ticket.provider] || ticket.provider}</span>
                                        <span class="text-gray-500 mx-2">|</span>
                                        <span>工单：${ticket.id}</span>
                                    </div>
                                    <div class="text-sm text-gray-300 italic">${ticket.task_description || ticket.issue?.description || ''}</div>
                                </div>
                                <div class="text-right ml-4">
                                    <div class="text-sm text-gray-400 mb-1">截止：${ticket.improvement_plan?.deadline || '未设置'}</div>
                                    <div class="text-sm text-gray-400">预计：${ticket.improvement_plan?.estimated_effort || '未知'}</div>
                                </div>
                            </div>

                            <!-- 进度条 -->
                            <div class="mb-4">
                                <div class="flex justify-between text-xs text-gray-400 mb-1">
                                    <span>进度</span>
                                    <span>${progress}%</span>
                                </div>
                                <div class="w-full bg-gray-700 rounded-full h-2">
                                    <div class="bg-gradient-to-r from-blue-500 to-green-500 h-2 rounded-full transition-all" style="width: ${progress}%"></div>
                                </div>
                            </div>

                            <!-- 行动项 -->
                            <div class="bg-gray-900/50 rounded-lg p-4">
                                <div class="text-sm font-bold mb-2">改进行动 (${doneActions}/${actions.length})</div>
                                <div class="space-y-2">
                                    ${actions.map((action, i) => `
                                        <div class="flex items-center gap-2">
                                            <button onclick="updateAction('${ticket.id}', ${i}, '${action.status === 'done' ? 'pending' : 'done'}')" class="text-lg hover:scale-125 transition-transform">
                                                ${action.status === 'done' ? '✅' : '⏳'}
                                            </button>
                                            <span class="${action.status === 'done' ? 'text-green-400 line-through' : 'text-gray-300'}">${action.task}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- 状态更新 -->
                            <div class="mt-4 flex gap-2">
                                <button onclick="updateStatus('${ticket.id}', 'in_progress')" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-sm">开始处理</button>
                                <button onclick="updateStatus('${ticket.id}', 'done')" class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-sm">完成</button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('加载工单失败:', error);
                document.getElementById('ticket-list').innerHTML = '<div class="text-center text-red-400 py-8">加载失败</div>';
            }
        }

        async function updateStatus(ticketId, status) {
            try {
                const res = await fetch(`/api/improvement-tickets/${ticketId}/status`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({status})
                });
                if (res.ok) {
                    loadTickets();
                }
            } catch (error) {
                alert('更新失败：' + error);
            }
        }

        async function updateAction(ticketId, actionIndex, status) {
            try {
                const res = await fetch(`/api/improvement-tickets/${ticketId}/action`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action_index: actionIndex, status})
                });
                if (res.ok) {
                    loadTickets();
                }
            } catch (error) {
                alert('更新失败：' + error);
            }
        }

        // 事件监听
        document.getElementById('filter-agent').addEventListener('change', loadTickets);
        document.getElementById('filter-priority').addEventListener('change', loadTickets);
        document.getElementById('filter-status').addEventListener('change', loadTickets);
        document.getElementById('search').addEventListener('input', loadTickets);

        // 初始加载
        loadTickets();

        // 定时刷新
        setInterval(loadTickets, 30000);
    </script>
</body>
</html>
