name: 🔀 PR 自动处理

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: 检查 PR 是否关联 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // 检查是否包含 Closes #xxx 或 Fixes #xxx
            const issueMatch = body.match(/(?:Closes|Fixes|Resolves)\s+#(\d+)/i);
            
            if (!issueMatch) {
              core.setFailed('PR 必须关联 Issue，请在描述中添加 `Closes #xxx`');
            } else {
              const issueNumber = issueMatch[1];
              console.log(`✅ PR 关联 Issue: #${issueNumber}`);
              core.setOutput('issue_number', issueNumber);
            }
      
      - name: 检查 Branch 命名
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branchName = pr.head.ref;
            
            // 检查 branch 命名是否符合 fix/IMPROVE-xxx 格式
            const validPatterns = [
              /^fix\/improve-\d+/i,
              /^feature\/.+/,
              /^bugfix\/.+/,
              /^hotfix\/.+/
            ];
            
            const isValid = validPatterns.some(pattern => pattern.test(branchName));
            
            if (!isValid) {
              console.log(`⚠️  Branch 命名不规范：${branchName}`);
              console.log('建议使用格式：fix/improve-xxx 或 feature/xxx');
            } else {
              console.log(`✅ Branch 命名规范：${branchName}`);
            }

  auto-label:
    runs-on: ubuntu-latest
    needs: validate-pr
    steps:
      - name: 添加 PR Label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // 提取 Issue 编号
            const issueMatch = body.match(/Closes\s+#(\d+)/i);
            if (issueMatch) {
              const issueNumber = issueMatch[1];
              
              // 获取关联的 Issue
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              
              // 复制 Issue 的 Label 到 PR
              const labels = issue.data.labels.map(l => l.name);
              labels.push('🔧 pending-review');
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
              
              console.log(`✅ 已添加 Label: ${labels.join(', ')}`);
            }

  notify-review:
    runs-on: ubuntu-latest
    needs: [validate-pr, auto-label]
    steps:
      - name: 通知 Reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // 提取 Issue 编号
            const issueMatch = body.match(/Closes\s+#(\d+)/i);
            if (!issueMatch) return;
            
            const issueNumber = issueMatch[1];
            
            // 获取 Issue 的 Assignee（即改进负责人）
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            const assignees = issue.data.assignees.map(a => a.login);
            const reviewers = ['coordinator-agent', 'qa-agent']; // 默认 Reviewer
            
            // 创建评论通知
            const comment = `
            ## 🔔 Code Review 通知
            
            **PR**: #${pr.number}  
            **关联 Issue**: #${issueNumber}  
            **改进负责人**: ${assignees.map(a => `@${a}`).join(', ')}  
            **请求 Review**: ${reviewers.map(r => `@${r}`).join(', ')}
            
            ### 📋 Review 清单
            
            - [ ] 代码质量检查
            - [ ] 功能验证
            - [ ] 测试覆盖
            - [ ] 文档更新
            
            ### ⚡ 快速操作
            
            - 批准：回复 \`LGTM\` 或点击 "Review changes" → "Approve"
            - 请求修改：回复具体问题并点击 "Request changes"
            - 评论：直接在此 PR 中评论
            
            ---
            *此消息由自动化系统发送*
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment
            });
            
            console.log(`✅ Review 通知已发送`);
