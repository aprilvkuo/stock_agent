name: Auto Improvement Ticket

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider Agent ID'
        required: true
        default: 'programmer'
      consumer:
        description: 'Consumer Agent ID'
        required: true
        default: 'coordinator'
      service_type:
        description: 'Service Type'
        required: true
        default: 'code_structure'
      score:
        description: 'Score (1-5)'
        required: true
        default: '2'
      feedback:
        description: 'Feedback'
        required: true
        default: 'Needs improvement'

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const provider = '${{ github.event.inputs.provider }}';
            const consumer = '${{ github.event.inputs.consumer }}';
            const service_type = '${{ github.event.inputs.service_type }}';
            const score = parseInt('${{ github.event.inputs.score }}');
            const feedback = '${{ github.event.inputs.feedback }}';
            
            let priority;
            if (score <= 1) priority = 'CRITICAL';
            else if (score <= 2) priority = 'HIGH';
            else if (score <= 3) priority = 'MEDIUM';
            else priority = 'LOW';
            
            const now = new Date();
            const issueId = 'IMPROVE-' + now.toISOString().replace(/[-:T.]/g, '').slice(0, 14);
            
            const AGENT_GITHUB = {
              'fundamental': 'fundamental-agent',
              'technical': 'technical-agent',
              'sentiment': 'sentiment-agent',
              'coordinator': 'coordinator-agent',
              'programmer': 'programmer-agent',
              'data-fetcher': 'data-fetcher-agent',
              'qa': 'qa-agent',
              'cio': 'cio-agent'
            };
            
            const providerGithub = AGENT_GITHUB[provider] || provider;
            const consumerGithub = AGENT_GITHUB[consumer] || consumer;
            
            let issueBody = '# Improvement Ticket: ' + issueId + '\n\n';
            issueBody += '**Priority**: ' + priority + '\n';
            issueBody += '**Provider**: @' + providerGithub + '\n';
            issueBody += '**Consumer**: @' + consumerGithub + '\n';
            issueBody += '**Service Type**: `' + service_type + '`\n';
            issueBody += '**Created**: ' + now.toISOString() + '\n';
            issueBody += '**Trigger**: GitHub Actions\n\n';
            issueBody += '---\n\n';
            issueBody += '## Rating\n\n';
            issueBody += '**Score**: ' + score + '/5.0\n\n';
            issueBody += '## Issue Description\n\n';
            issueBody += feedback + '\n\n';
            issueBody += '## Action Items\n\n';
            issueBody += '- [ ] Analyze the problem\n';
            issueBody += '- [ ] Create improvement plan\n';
            issueBody += '- [ ] Implement fixes\n';
            issueBody += '- [ ] Verify results\n\n';
            issueBody += '---\n\n';
            issueBody += '## Workflow\n\n';
            issueBody += '1. Accept task - @' + providerGithub + '\n';
            issueBody += '2. Create branch - `fix/' + issueId.toLowerCase() + '`\n';
            issueBody += '3. Implement fixes\n';
            issueBody += '4. Create PR - Link this issue\n';
            issueBody += '5. Code review\n';
            issueBody += '6. Merge and close\n';
            
            const labels = ['improvement-ticket', 'automated'];
            if (priority === 'CRITICAL') labels.push('critical');
            else if (priority === 'HIGH') labels.push('high-priority');
            else if (priority === 'MEDIUM') labels.push('medium-priority');
            else labels.push('low-priority');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[' + priority + '] ' + providerGithub + ' needs improvement: ' + service_type,
              body: issueBody,
              labels: labels
            });
            
            console.log('Issue created: #' + issue.data.number);
            console.log('Creator: ' + issue.data.user.login);
            console.log('URL: ' + issue.data.html_url);
