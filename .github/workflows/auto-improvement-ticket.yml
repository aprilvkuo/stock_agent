name: 🎫 自动改进工单创建

on:
  workflow_dispatch:
    inputs:
      provider:
        description: '乙方 Agent ID (如：programmer)'
        required: true
        default: 'programmer'
      consumer:
        description: '甲方 Agent ID (如：coordinator)'
        required: true
        default: 'coordinator'
      service_type:
        description: '服务类型'
        required: true
        default: 'code_structure'
      score:
        description: '评分 (1-5)'
        required: true
        default: '2'
      feedback:
        description: '问题描述'
        required: true
        default: '需要改进'

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: 创建改进工单 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const provider = '${{ github.event.inputs.provider }}';
            const consumer = '${{ github.event.inputs.consumer }}';
            const service_type = '${{ github.event.inputs.service_type }}';
            const score = parseInt('${{ github.event.inputs.score }}');
            const feedback = '${{ github.event.inputs.feedback }}';
            
            let priority, priorityLabel;
            if (score <= 1) {
              priority = 'CRITICAL';
              priorityLabel = 'critical';
            } else if (score <= 2) {
              priority = 'HIGH';
              priorityLabel = 'high-priority';
            } else if (score <= 3) {
              priority = 'MEDIUM';
              priorityLabel = 'medium-priority';
            } else {
              priority = 'LOW';
              priorityLabel = 'low-priority';
            }
            
            const now = new Date();
            const issueId = 'IMPROVE-' + now.toISOString().replace(/[-:T.]/g, '').slice(0, 14);
            
            const AGENT_GITHUB = {
              'fundamental': 'fundamental-agent',
              'technical': 'technical-agent',
              'sentiment': 'sentiment-agent',
              'coordinator': 'coordinator-agent',
              'programmer': 'programmer-agent',
              'data-fetcher': 'data-fetcher-agent',
              'qa': 'qa-agent',
              'cio': 'cio-agent'
            };
            
            const providerGithub = AGENT_GITHUB[provider] || provider;
            const consumerGithub = AGENT_GITHUB[consumer] || consumer;
            
            const issueBody = '# 🎫 改进工单：' + issueId + '\n\n' +
              '**优先级**: ' + priority + '  \n' +
              '**乙方**: @' + providerGithub + '  \n' +
              '**甲方**: @' + consumerGithub + '  \n' +
              '**服务类型**: `' + service_type + '`  \n' +
              '**创建时间**: ' + now.toISOString() + '  \n' +
              '**触发方式**: GitHub Actions 自动化\n\n' +
              '---\n\n' +
              '## ⭐ 总体评分\n\n' +
              '**得分**: ' + score + '/5.0\n\n' +
              '## 📝 问题描述\n\n' +
              feedback + '\n\n' +
              '## 💡 改进建议\n\n' +
              '- [ ] 分析具体问题原因\n' +
              '- [ ] 制定改进计划\n' +
              '- [ ] 实施改进\n' +
              '- [ ] 验证改进效果\n\n' +
              '---\n\n' +
              '## 📋 处理流程\n\n' +
              '1. **接收任务** - @' + providerGithub + ' 确认接收\n' +
              '2. **创建 Branch** - `fix/' + issueId.toLowerCase() + '`\n' +
              '3. **解决问题** - 实施改进\n' +
              '4. **创建 PR** - 关联此 Issue\n' +
              '5. **Code Review** - 等待审核\n' +
              '6. **Merge** - 合并后自动关闭\n\n' +
              '---\n\n' +
              '**标签**: `improvement-ticket` `agent-feedback` `automated`';
            
            const labels = ['improvement-ticket', 'automated', priorityLabel];
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[' + priority + '] ' + providerGithub + ' 需要改进：' + service_type,
              body: issueBody,
              labels: labels
            });
            
            console.log('✅ Issue 创建成功：#' + issue.data.number);
            console.log('   标题：' + issue.data.title);
            console.log('   创建者：' + issue.data.user.login);
            console.log('   链接：' + issue.data.html_url);
