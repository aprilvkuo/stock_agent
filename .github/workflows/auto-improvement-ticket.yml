name: Auto Improvement Ticket

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider Agent ID'
        required: true
        default: 'programmer'
      consumer:
        description: 'Consumer Agent ID'
        required: true
        default: 'coordinator'
      service_type:
        description: 'Service Type'
        required: true
        default: 'code_structure'
      score:
        description: 'Score (1-5)'
        required: true
        default: '2'
      feedback:
        description: 'Feedback'
        required: true
        default: 'Needs improvement'

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const provider = '${{ github.event.inputs.provider }}';
            const consumer = '${{ github.event.inputs.consumer }}';
            const service_type = '${{ github.event.inputs.service_type }}';
            const score = parseInt('${{ github.event.inputs.score }}');
            const feedback = '${{ github.event.inputs.feedback }}';
            
            let priority;
            if (score <= 1) priority = 'CRITICAL';
            else if (score <= 2) priority = 'HIGH';
            else if (score <= 3) priority = 'MEDIUM';
            else priority = 'LOW';
            
            const now = new Date();
            const issueId = 'IMPROVE-' + now.toISOString().replace(/[-:T.]/g, '').slice(0, 14);
            
            const AGENT_GITHUB = {
              'fundamental': 'fundamental-agent',
              'technical': 'technical-agent',
              'sentiment': 'sentiment-agent',
              'coordinator': 'coordinator-agent',
              'programmer': 'programmer-agent',
              'data-fetcher': 'data-fetcher-agent',
              'qa': 'qa-agent',
              'cio': 'cio-agent'
            };
            
            const providerGithub = AGENT_GITHUB[provider] || provider;
            const consumerGithub = AGENT_GITHUB[consumer] || consumer;
            
            let issueBody = '# 改进工单\n\n';
            issueBody += '> 让代码更优雅，让系统更稳定\n\n';
            issueBody += '---\n\n';
            issueBody += '## 基本信息\n\n';
            issueBody += '| 项目 | 内容 |\n';
            issueBody += '|------|------|\n';
            issueBody += '| 工单 ID | `' + issueId + '` |\n';
            issueBody += '| 优先级 | ' + priority + ' |\n';
            issueBody += '| 负责方 | @' + providerGithub + ' |\n';
            issueBody += '| 提出方 | @' + consumerGithub + ' |\n';
            issueBody += '| 服务类型 | `' + service_type + '` |\n';
            issueBody += '| 评分 | ' + score + '/5.0 |\n';
            issueBody += '| 创建时间 | ' + now.toISOString().split('T')[0] + ' |\n';
            issueBody += '| 触发方式 | GitHub Actions 自动化 |\n\n';
            issueBody += '---\n\n';
            issueBody += '## 问题描述\n\n';
            issueBody += '> 一句话总结：' + feedback.substring(0, 50) + '\n\n';
            issueBody += '详细反馈:\n';
            issueBody += feedback + '\n\n';
            issueBody += '---\n\n';
            issueBody += '## 改进目标\n\n';
            issueBody += '- [ ] 问题定位 - 分析具体原因，找出 root cause\n';
            issueBody += '- [ ] 方案设计 - 制定可执行的改进计划\n';
            issueBody += '- [ ] 快速迭代 - 实施改进，小步快跑\n';
            issueBody += '- [ ] 验证闭环 - 测试验证，确保效果\n\n';
            issueBody += '---\n\n';
            issueBody += '## 处理流程\n\n';
            issueBody += '1. 接收任务 - @' + providerGithub + ' 确认接单\n';
            issueBody += '2. 创建 Branch - `fix/' + issueId.toLowerCase() + '`\n';
            issueBody += '3. 解决问题 - 快速迭代，及时同步进度\n';
            issueBody += '4. 创建 PR - 关联此 Issue (Closes #)\n';
            issueBody += '5. Code Review - 等待 @qa-agent 审核\n';
            issueBody += '6. Merge 关闭 - 合并后自动关闭\n\n';
            issueBody += '---\n\n';
            issueBody += '## 关键信息\n\n';
            issueBody += '- 关联 Issue: 无\n';
            issueBody += '- 依赖 PR: 无\n';
            issueBody += '- 影响范围: ' + service_type + '\n\n';
            issueBody += '---\n\n';
            issueBody += '## 沟通记录\n\n';
            issueBody += '> 在此添加评论，同步进度和讨论问题\n\n';
            issueBody += '---\n\n';
            issueBody += '标签: improvement-ticket, agent-feedback, automated\n\n';
            issueBody += '---\n\n';
            issueBody += '> 让每一次改进都成为成长的阶梯\n';
            
            const labels = ['improvement-ticket', 'automated'];
            if (priority === 'CRITICAL') labels.push('critical');
            else if (priority === 'HIGH') labels.push('high-priority');
            else if (priority === 'MEDIUM') labels.push('medium-priority');
            else labels.push('low-priority');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[' + priority + '] @' + providerGithub + ' 待优化：' + service_type,
              body: issueBody,
              labels: labels
            });
            
            console.log('Issue created: #' + issue.data.number);
            console.log('Creator: ' + issue.data.user.login);
            console.log('URL: ' + issue.data.html_url);
