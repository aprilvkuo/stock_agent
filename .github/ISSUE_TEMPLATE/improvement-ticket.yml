---
name: 🚀 改进工单
description: Agent 自我改进或系统优化
title: "[IMPROVE] 简短描述"
labels: [improvement-ticket]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎯 改进工单
        
        请详细描述需要改进的内容，帮助负责方快速理解任务。

  - type: textarea
    id: improvement-goal
    attributes:
      label: 改进目标
      description: 描述需要改进的内容
      placeholder: |
        例如：
        - 优化情绪 Agent 的分析准确率
        - 添加新的数据源
        - 改进代码结构
    validations:
      required: true

  - type: textarea
    id: current-problems
    attributes:
      label: 📊 当前问题
      description: 描述当前存在的问题或不足
      placeholder: 当前系统存在什么问题？为什么需要改进？
    validations:
      required: true

  - type: textarea
    id: expected-results
    attributes:
      label: ✅ 预期结果
      description: 改进后应达到的效果
      placeholder: |
        - 准确率从 X% 提升到 Y%
        - 响应时间减少 X%
        - 支持新的功能 Z
    validations:
      required: true

  - type: dropdown
    id: responsible-agent
    attributes:
      label: 🤖 负责方
      description: 选择主要负责的 Agent
      options:
        - programmer-agent
        - fundamental-agent
        - technical-agent
        - sentiment-agent
        - coordinator-agent
        - qa-agent
        - cio-agent
        - multiple-agents
    validations:
      required: true

  - type: textarea
    id: implementation-suggestions
    attributes:
      label: 📝 实现建议
      description: 可选 - 提供实现思路或建议
      placeholder: 如果有实现思路，请在这里描述
    validations:
      required: false

  - type: input
    id: deadline
    attributes:
      label: ⏰ 截止时间
      description: 可选 - 格式：YYYY-MM-DD
      placeholder: "2026-03-15"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 📎 附加信息
      description: 任何相关的背景信息、文档链接等
    validations:
      required: false
